name: Java CI Combined

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to Maven Central'
        type: boolean
        default: false
      lucee-versions:
        description: 'JSON array of Lucee versions to test'
        default: '["7.0/snapshot/light","7.0/stable/light","6.2/snapshot/light","6.2/stable/light"]'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.VERSION }}
      lucee-matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Extract version number
        id: extract-version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set Lucee test matrix
        id: set-matrix
        run: |
          DEFAULT='["7.0/snapshot/light","7.0/stable/light","6.2/snapshot/light","6.2/stable/light"]'
          MATRIX="${{ inputs.lucee-versions || '' }}"
          if [ -z "$MATRIX" ]; then
            MATRIX="$DEFAULT"
          fi
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Cache Lucee files
        uses: actions/cache@v5
        with:
          path: ~/work/_actions/lucee/script-runner/main/lucee-download-cache
          key: lucee-downloads

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and Install with Maven
        run: |
          echo "------- Maven Install -------";
          mvn -B -e -f pom.xml clean install

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: websocketclient-lex
          path: target/*.lex

  test:
    runs-on: ubuntu-latest
    needs: [setup, build]
    strategy:
      fail-fast: false
      matrix:
        lucee: ${{ fromJSON(needs.setup.outputs.lucee-matrix) }}
        java: [ 11, 21 ]
    steps:
      - uses: actions/checkout@v6

      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: websocketclient-lex
          path: target

      - name: Checkout Lucee
        uses: actions/checkout@v6
        with:
          repository: lucee/lucee
          path: lucee

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'adopt'

      - name: Run Lucee Test Suite
        uses: lucee/script-runner@main
        with:
          webroot: ${{ github.workspace }}/lucee/test
          execute: /bootstrap-tests.cfm
          luceeVersion: ${{ matrix.lucee }}
          extensionDir: ${{ github.workspace }}/target
        env:
          testLabels: websocketclient
          testAdditional: ${{ github.workspace }}/tests

  test-integration:
    # Runs the integration test suite that lives in the server repo's tests/integration/
    # folder against this branch's freshly-built client .lex. Pulls the server repo
    # and builds it from the LDEV-6221 redux branch so the post-restart delegation
    # chain works (needed to prove LDEV-6273 — the client-side IOB fix — end-to-end).
    runs-on: ubuntu-latest
    needs: [build]
    env:
      # LDEV-6273: trigger-lucee-restart.cfm and Lucee's admin both read this.
      # Must be set at job level so catalina.sh's spawned JVM inherits it.
      LUCEE_ADMIN_PASSWORD: testadmin
    strategy:
      fail-fast: false
      matrix:
        lucee: [ "6.2/stable/jar", "7.0/stable/jar" ]
    steps:
      - uses: actions/checkout@v6

      - name: Determine Tomcat and Java version
        id: config
        run: |
          MAJOR_MINOR=$(echo "${{ matrix.lucee }}" | grep -oE '^[0-9]+\.[0-9]+')
          case "$MAJOR_MINOR" in
            6.2)
              echo "tomcat=tomcat-9"  >> $GITHUB_OUTPUT
              echo "java=11"          >> $GITHUB_OUTPUT
              ;;
            7.0|7.1)
              echo "tomcat=tomcat-11" >> $GITHUB_OUTPUT
              echo "java=21"          >> $GITHUB_OUTPUT
              ;;
            *)
              echo "ERROR: Unknown Lucee major version: $MAJOR_MINOR"; exit 1 ;;
          esac

      - name: Set up JDK ${{ steps.config.outputs.java }}
        uses: actions/setup-java@v5
        with:
          java-version: '${{ steps.config.outputs.java }}'
          distribution: 'temurin'

      - name: Download this branch's client .lex
        uses: actions/download-artifact@v8
        with:
          name: websocketclient-lex
          path: client-lex

      - name: Checkout server repo at LDEV-6221 redux branch
        # LDEV-6273: we need the redux-branch server fixes for the post-restart
        # delegation chain to work, so the client IOB regression test can prove
        # end-to-end. Revert to sparse-checkout + curl from ext.lucee.org once
        # both ldev-6221-redux (server) and LDEV-6273 (client) have merged.
        uses: actions/checkout@v6
        with:
          repository: lucee/extension-websocket
          ref: ldev-6221-redux
          path: server-repo

      - name: Build server extension .lex from source
        run: |
          cd server-repo
          mvn -B -e -f pom.xml clean install -DskipTests
          ls -la target/*.lex
          cp target/*.lex ../server.lex

      - name: Download Lucee Express template
        run: |
          EXPRESS_URL=$(curl -s https://update.lucee.org/rest/update/provider/expressTemplates | jq -r '.["${{ steps.config.outputs.tomcat }}"]')
          curl -L -o express-template.zip "$EXPRESS_URL"
          unzip -q express-template.zip -d lucee-express

      - name: Download Lucee JAR
        id: lucee-jar
        run: |
          LUCEE_URL=$(curl -s "https://update.lucee.org/rest/update/provider/latest/${{ matrix.lucee }}/url" | tr -d '"')
          LUCEE_VERSION=$(basename "$LUCEE_URL" | sed 's/lucee-//;s/\.jar//')
          echo "LUCEE_VERSION=$LUCEE_VERSION" >> $GITHUB_OUTPUT
          curl -L -f -o lucee.jar "$LUCEE_URL"
          rm -f lucee-express/lib/lucee-*.jar
          cp lucee.jar lucee-express/lib/

      - name: Install both extensions into Express
        run: |
          mkdir -p lucee-express/lucee-server/deploy
          cp client-lex/*.lex lucee-express/lucee-server/deploy/
          cp server.lex       lucee-express/lucee-server/deploy/
          ls -la lucee-express/lucee-server/deploy/

      - name: Copy listeners and tests from server repo
        run: |
          mkdir -p lucee-express/lucee-server/context/websockets
          find server-repo/tests -path '*/websockets/*.cfc' -exec cp {} lucee-express/lucee-server/context/websockets/ \;
          cp -r server-repo/tests lucee-express/webapps/ROOT/
          ls -la lucee-express/lucee-server/context/websockets/

      - name: Configure Tomcat port
        run: sed -i 's/port="8080"/port="8888"/g' lucee-express/conf/server.xml

      - name: Start Lucee Express
        run: |
          cd lucee-express && ./bin/catalina.sh start

      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8888/ | grep -q "200\|302\|404"; then
              echo "HTTP ready after $i seconds"; break
            fi
            sleep 1
          done

      - name: Warm up — wait for websocket extension to finish registering endpoints
        run: |
          # The extension's Registrar runs on a background thread after Lucee starts —
          # if we fire integration tests before it's registered /ws/* endpoints, we get
          # 404 during the WebSocket upgrade. Poll test-websocket-info.cfm which returns
          # SUCCESS once the extension is loaded and endpoints are registered.
          for i in {1..30}; do
            RESPONSE=$(curl -s http://localhost:8888/tests/test-websocket-info.cfm)
            if echo "$RESPONSE" | grep -q "SUCCESS"; then
              echo "Extension ready after $i attempts"
              break
            fi
            sleep 1
          done

      - name: Run integration tests
        id: integration-tests
        continue-on-error: true
        run: |
          FAILED=false
          for test in test-websocket-client test-lifecycle-callbacks test-return-value-send test-wsclient-broadcast test-wsclients-plural test-binary-send; do
            echo ""
            echo "=== Running ${test} ==="
            RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:8888/tests/integration/${test}.cfm)
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "$BODY"
            echo "$BODY" > /tmp/${test}.txt
            if [ "$HTTP_CODE" != "200" ] || echo "$BODY" | grep -q "FAILED"; then
              echo "${test}: ❌ FAILED"
              FAILED=true
            else
              echo "${test}: ✅ PASSED"
            fi
          done
          if [ "$FAILED" = "true" ]; then
            echo "INTEGRATION_FAILED=true" >> $GITHUB_OUTPUT
          fi

      # ---------- LDEV-6273 restart scenario ----------
      # Triggers cfadmin action="restart", waits for Lucee to recover, and runs
      # a post-restart WebSocket round-trip. Regression gate: asserts no
      # "Index 0 out of bounds" appears in catalina.out — the client-side IOB
      # from the pre-fix stale static engine reference.

      - name: Trigger Lucee engine restart (LDEV-6273 scenario)
        id: restart-trigger
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:8888/tests/integration/trigger-lucee-restart.cfm)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY"
          if [ "$HTTP_CODE" != "200" ] || echo "$BODY" | grep -q "FAILED"; then
            echo "RESTART_TRIGGER_FAILED=true" >> $GITHUB_OUTPUT
          fi

      - name: Wait for Lucee to come back online
        run: |
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8888/tests/test-websocket-info.cfm | grep -q "200"; then
              echo "Lucee responding after $i attempts"
              break
            fi
            sleep 1
          done

      - name: LDEV-6273 DIAG — extra settle time + extra HTTP hits
        run: |
          # Probe whether the post-restart IOB is purely a timing/traffic issue.
          # If servletConfigs fills with additional HTTP traffic, these extra
          # hits + sleep will let the reflection test pass without any code change.
          for i in 1 2 3 4 5; do
            curl -s -o /dev/null http://localhost:8888/tests/test-websocket-info.cfm
            sleep 1
          done
          echo "5 extra HTTP hits + 5s settle complete"

      - name: Run post-restart round-trip
        id: post-restart-test
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:8888/tests/integration/test-reflection-restart.cfm)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY"
          if [ "$HTTP_CODE" != "200" ] || echo "$BODY" | grep -q "FAILED"; then
            echo "POST_RESTART_FAILED=true" >> $GITHUB_OUTPUT
          fi

      - name: Regression gate — no IOB in catalina.out
        id: iob-check
        continue-on-error: true
        run: |
          # LDEV-6273: pre-fix, the websocket-client reading thread IOBs against
          # the retired engine's empty servletConfigs on every incoming frame after
          # cfadmin restart. This is the exact string we're gating on.
          if grep -q "Index 0 out of bounds for length 0" lucee-express/logs/catalina.out; then
            echo "IOB_FOUND=true" >> $GITHUB_OUTPUT
            echo "LDEV-6273 regression — IOB present in catalina.out:"
            grep -B2 -A5 "Index 0 out of bounds for length 0" lucee-express/logs/catalina.out | head -40
          else
            echo "No IOB in catalina.out — client handles post-restart frames cleanly"
          fi

      - name: Dump WebSocket event logs
        if: always()
        run: |
          echo "=== WebSocket Test Event Logs ==="
          found=false
          for f in /tmp/ws-*-events.log; do
            [ -f "$f" ] || continue
            found=true
            echo ""
            echo "--- $f ---"
            cat "$f"
          done
          if [ "$found" = "false" ]; then
            echo "(no event logs found)"
          fi

      - name: Stop Lucee Express
        if: always()
        run: cd lucee-express && ./bin/shutdown.sh || true

      - name: Show catalina.out
        if: always()
        run: cat lucee-express/logs/catalina.out || echo "No catalina.out found"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lucee-logs-${{ steps.lucee-jar.outputs.LUCEE_VERSION }}
          path: |
            lucee-express/logs/
            lucee-express/lucee-server/context/logs/

      - name: Fail if any integration step failed
        if: >-
          steps.integration-tests.outputs.INTEGRATION_FAILED == 'true'
          || steps.restart-trigger.outputs.RESTART_TRIGGER_FAILED == 'true'
          || steps.post-restart-test.outputs.POST_RESTART_FAILED == 'true'
          || steps.iob-check.outputs.IOB_FOUND == 'true'
        run: exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: [setup, test, test-integration]
    if: always() && needs.test.result == 'success' && needs.test-integration.result == 'success' && github.event_name == 'workflow_dispatch' && inputs.deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build and Deploy with Maven
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [[ "${{ needs.setup.outputs.version }}" == *-SNAPSHOT ]]; then
            echo "------- Maven Deploy snapshot on ${{ github.event_name }} -------";
            mvn -B -e -f pom.xml clean deploy --settings maven-settings.xml
          else
            echo "------- Maven Deploy release on ${{ github.event_name }} -------";
            mvn -B -e -f pom.xml clean deploy -DperformRelease=true --settings maven-settings.xml
          fi
